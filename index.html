<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap Sidebar Navigation</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        display: flex;
      }

      nav {
        height: 100vh; /* Navbar takes the full height of the viewport */
        position: fixed;
        width: 250px; /* Width of the sidebar */
        top: 0;
        left: 0;
      }

      .content {
        margin-left: 220px; /* Make space for the sidebar */
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center; /* Center items horizontally */
        justify-content: center; /* Center items vertically */
        height: 100vh; /* Make content area full height */
      }

      .navbar-nav {
        width: 100%;
        display: flex;
        flex-direction: column; /* Vertical navigation */
      }

      .navbar-nav li {
        width: 100%;
      }

      .navbar-nav .nav-link {
        text-align: left;
        padding: 10px 20px;
        font-size: 20px;
      }

      .navbar-brand {
        padding: 10px;
      }

      img {
        width: 300px; /* Set desired width */
        height: 300px; /* Set the same height */
        border-radius: 50%; /* Makes the image circular */
        object-fit: cover;
        margin-top: 20px; /* Add some space above the image */
      }
    </style>
  </head>
  <body>
    <nav class="navbar bg-body-tertiary">
      <div class="container d-flex flex-column">
        <span class="h3">Tiara Shofa Shofiana</span>
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="about.html">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="project.html">Project</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="kontak.html">Kontak</a>
          </li>
        </ul>
      </div>
    </nav>

    <div class="content text-center">
      <h1>Selamat datang di portofolio saya!</h1>
      <p>
        Saya Tiara Shofa Shofiana mahasiswa universitas nahdlatul ulama Jepara
        fakultas sainstek prodi teknik informatika.
      </p>
      <img src="gambar.jpeg" alt="Profile Picture" />
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
