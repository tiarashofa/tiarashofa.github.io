<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap Sidebar Navigation</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        display: flex;
      }

      nav {
        height: 100vh; /* Navbar takes the full height of the viewport */
        position: fixed;
        width: 250px; /* Width of the sidebar */
        top: 0;
        left: 0;
      }

      .content {
        margin-left: 250px; /* Make space for the sidebar */
        padding: 20px;
      }

      .form-container {
        max-width: 600px; /* Set max width for the form */
        margin: 0 auto; /* Center the form */
      }

      .navbar-nav {
        width: 100%;
        display: flex;
        flex-direction: column; /* Vertical navigation */
      }

      .navbar-nav li {
        width: 100%;
      }

      .navbar-nav .nav-link {
        text-align: left;
        padding: 10px 20px;
        font-size: 20px;
      }

      .navbar-brand {
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <nav class="navbar bg-body-tertiary">
      <div class="container d-flex flex-column">
        <span class="h3">Tiara Shofa Shofiana</span>
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="about.html">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="project.html">Project</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="kontak.html">Kontak</a>
          </li>
        </ul>
      </div>
    </nav>

    <div class="content">
      <h1>Contact Us</h1>
      <div class="form-container">
        <div class="card">
          <div class="card-body">
            <form id="contactForm">
              <div class="mb-3">
                <label for="exampleInputEmail1" class="form-label"
                  >Email address</label
                >
                <input
                  type="email"
                  class="form-control"
                  id="exampleInputEmail1"
                  aria-describedby="emailHelp"
                  required
                />
                <div id="emailHelp" class="form-text">
                  We'll never share your email with anyone else.
                </div>
              </div>
              <div class="mb-3">
                <label for="exampleInputPassword1" class="form-label"
                  >Password</label
                >
                <input
                  type="password"
                  class="form-control"
                  id="exampleInputPassword1"
                  required
                />
              </div>
              <div class="mb-3 form-check">
                <input
                  type="checkbox"
                  class="form-check-input"
                  id="exampleCheck1"
                  required
                />
                <label class="form-check-label" for="exampleCheck1"
                  >Check me out</label
                >
              </div>
              <button type="submit" class="btn btn-primary">Submit</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <script>
      document
        .getElementById("contactForm")
        .addEventListener("submit", function (event) {
          event.preventDefault(); // Mencegah pengiriman form default

          // Ambil nilai input
          const email = document.getElementById("exampleInputEmail1").value;
          const password = document.getElementById(
            "exampleInputPassword1"
          ).value;
          const isChecked = document.getElementById("exampleCheck1").checked;

          // Validasi input
          if (email === "" || password === "" || !isChecked) {
            alert("Semua field harus diisi!");
            return;
          }

          // Jika valid, tampilkan pesan
          alert("Form telah berhasil dikirim!");
          // Di sini Anda bisa menambahkan logika untuk mengirim data ke server atau melakukan tindakan lain
        });
    </script>
  </body>
</html>
